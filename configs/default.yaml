# =============================================================================
# Volleyball Activity Recognition — Default Hyperparameters
# Ibrahim et al., "Hierarchical Deep Temporal Models for Group Activity Recognition"
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  data_root: "data/volleyball"          # root of the extracted dataset
  output_dir: "outputs"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  figures_dir: "outputs/figures"

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset:
  # Video split ids (paper uses 55 videos: ~2/3 train, ~1/3 test)
  train_videos: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38,
                 39, 40, 41, 42, 48, 50, 52, 53, 54]
  val_videos:   [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
  test_videos:  [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

  # Temporal window around the annotated key frame
  # Paper uses T=9: frames [t-4, t-3, t-2, t-1, t, t+1, t+2, t+3, t+4]
  # (Volleyball paper: 5 timesteps for LSTM1, 10 for LSTM2 — window loaded = 9)
  num_frames: 9          # total frames in the temporal clip
  frame_offset: 1        # stride between sampled frames (1 = every frame)

  # Person / bounding-box settings
  max_players: 12         # pad / truncate to this many players per frame
  # Baseline simplification: reuse target-frame bbox across all T frames
  reuse_target_bbox: true

  # Image loading
  image_size: [224, 224]  # (H, W) after resize — AlexNet canonical input
  mean: [0.485, 0.456, 0.406]   # ImageNet mean (RGB)
  std:  [0.229, 0.224, 0.225]   # ImageNet std  (RGB)

  # DataLoader
  num_workers: 4
  pin_memory: true

# ---------------------------------------------------------------------------
# Label spaces  (matches paper Tables 3 & 4)
# ---------------------------------------------------------------------------
labels:
  group_activities:
    - "r_set"       # right set
    - "r_spike"     # right spike
    - "r_pass"      # right pass
    - "r_winpoint"  # right winpoint
    - "l_winpoint"  # left winpoint
    - "l_pass"      # left pass
    - "l_spike"     # left spike
    - "l_set"       # left set
  num_group_classes: 8

  person_actions:
    - "waiting"
    - "setting"
    - "digging"
    - "falling"
    - "spiking"
    - "blocking"
    - "jumping"
    - "moving"
    - "standing"
  num_person_classes: 9

# ---------------------------------------------------------------------------
# CNN Backbone  (Stage 0 — visual feature extractor)
# ---------------------------------------------------------------------------
cnn:
  backbone: "alexnet"     # paper uses AlexNet pre-trained on ImageNet
  feature_layer: "fc7"    # 4096-d output (second fully-connected layer)
  feature_dim: 4096
  pretrained: true
  # Paper fine-tunes the CNN jointly with LSTM1 in stage-1 training
  freeze: false

# ---------------------------------------------------------------------------
# Person-level temporal model  (Stage 1 — LSTM1 / "red" in the diagram)
# ---------------------------------------------------------------------------
person_lstm:
  input_dim: 4096          # CNN fc7 feature dim  →  x_{t,k}
  hidden_dim: 3000         # paper: 3000 hidden nodes
  num_layers: 1
  dropout: 0.0
  bidirectional: false

# ---------------------------------------------------------------------------
# Person embedding fusion
# P_{t,k} = x_{t,k} ⊕ h_{t,k}  (vector concatenation)
# ---------------------------------------------------------------------------
person_embedding:
  # dim = cnn.feature_dim + person_lstm.hidden_dim
  dim: 7096   # 4096 + 3000  (computed automatically in code, listed here for reference)

# ---------------------------------------------------------------------------
# Sub-group pooling  (Sec. 3.3)
# Players are sorted by top-left bbox x-coordinate, then split into d groups.
# G_{t,m} = MaxPool over players in group m
# Z_t     = concat of G_{t,1} ... G_{t,d}
# ---------------------------------------------------------------------------
pooling:
  num_subgroups: 2          # paper best result: 2 (left / right team)
  strategy: "max"           # "max" | "avg"
  # frame descriptor dim = person_embedding.dim × num_subgroups
  frame_dim: 14192          # 7096 × 2  (computed automatically in code)

# ---------------------------------------------------------------------------
# Group-level temporal model  (Stage 2 — LSTM2 / "blue" in the diagram)
# ---------------------------------------------------------------------------
group_lstm:
  # Input: Z_t fed through a FC projection before the LSTM
  fc_input_dim: 14192       # = pooling.frame_dim
  fc_hidden_dim: 3000       # fully-connected projection layer before LSTM2
  hidden_dim: 2000          # paper: 2000 hidden nodes for group LSTM
  num_layers: 1
  num_timesteps: 10         # paper: 10 timesteps for LSTM2
  dropout: 0.0
  bidirectional: false

# ---------------------------------------------------------------------------
# Classification heads
# ---------------------------------------------------------------------------
classifier:
  # Group activity head (main objective)
  group:
    in_dim: 2000            # = group_lstm.hidden_dim
    num_classes: 8          # = labels.num_group_classes

  # Person action head (auxiliary, used only in stage-1 training)
  person:
    in_dim: 3000            # = person_lstm.hidden_dim
    num_classes: 9          # = labels.num_person_classes

# ---------------------------------------------------------------------------
# Loss
# ---------------------------------------------------------------------------
loss:
  # Cross-entropy weights for the two objectives
  group_weight: 1.0
  person_weight: 1.0        # set to 0.0 to disable auxiliary person loss
  label_smoothing: 0.0      # 0.0 = standard cross-entropy

# ---------------------------------------------------------------------------
# Training protocol  (Sec. 3.4 — two-stage training)
# ---------------------------------------------------------------------------
training:
  # ── Stage 1: train CNN + LSTM1 with person-action labels ──
  stage1:
    epochs: 50
    batch_size: 8
    optimizer: "sgd"
    lr: 0.00001             # paper: fixed LR = 1e-5
    momentum: 0.9           # paper: momentum = 0.9
    weight_decay: 0.0005
    lr_scheduler: null      # null = constant LR (paper uses fixed LR)
    grad_clip: 5.0          # gradient clipping max norm

  # ── Stage 2: freeze CNN+LSTM1, train LSTM2 with group-activity labels ──
  stage2:
    epochs: 50
    batch_size: 8
    optimizer: "sgd"
    lr: 0.00001
    momentum: 0.9
    weight_decay: 0.0005
    lr_scheduler: null
    grad_clip: 5.0

  # Shared settings
  seed: 42
  device: "cuda"            # "cuda" | "cpu"
  mixed_precision: false    # enable torch.cuda.amp
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_every_n_epochs: 5
  early_stopping_patience: 20   # -1 to disable

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  batch_size: 16
  metrics:
    - "accuracy"
    - "confusion_matrix"
    - "per_class_accuracy"
  checkpoint: "best"        # "best" | "last" | path to .pt file