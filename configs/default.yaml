# =============================================================================
# Volleyball Activity Recognition — Default Hyperparameters
# Ibrahim et al., "Hierarchical Deep Temporal Models for Group Activity Recognition"
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  data_root: "data/videos_g10"
  output_dir: "outputs"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  figures_dir: "outputs/figures"

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset:
  train_videos: [1, 3, 6, 7, 10, 13, 15, 16, 18, 22, 23, 31, 32, 36, 38,
                 39, 40, 41, 42, 48, 50, 52, 53, 54]
  val_videos:   [0, 2, 8, 12, 17, 19, 24, 26, 27, 28, 30, 33, 46, 49, 51]
  test_videos:  [4, 5, 9, 11, 14, 20, 21, 25, 29, 34, 35, 37, 43, 44, 45, 47]

  num_frames: 9
  frame_offset: 1

  max_players: 12
  reuse_target_bbox: true

  image_size: [224, 224]
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]

  num_workers: 4
  pin_memory: true

# ---------------------------------------------------------------------------
# Label spaces
# ---------------------------------------------------------------------------
labels:
  group_activities:
    - "r_spike"
    - "r_set"
    - "l-spike"
    - "l_set"
    - "r-pass"
    - "l-pass"
    - "r_winpoint"
    - "l_winpoint"
  num_group_classes: 8

  person_actions:
    - "waiting"
    - "setting"
    - "digging"
    - "falling"
    - "spiking"
    - "blocking"
    - "jumping"
    - "moving"
    - "standing"
  num_person_classes: 9

# ---------------------------------------------------------------------------
# CNN Backbone
# ---------------------------------------------------------------------------
cnn:
  backbone: "alexnet" # resnet50, alexnet, mobilenet_v3_large
  feature_layer: "fc7"
  feature_dim: 4096
  pretrained: true
  freeze: false

# ---------------------------------------------------------------------------
# Person-level temporal model  (LSTM1)
# ---------------------------------------------------------------------------
person_lstm:
  input_dim: 4096
  hidden_dim: 3000
  num_layers: 1
  dropout: 0.0
  bidirectional: false

# ---------------------------------------------------------------------------
# Person embedding fusion
# ---------------------------------------------------------------------------
person_embedding:
  dim: 7096   # 4096 + 3000

# ---------------------------------------------------------------------------
# Sub-group pooling
# ---------------------------------------------------------------------------
pooling:
  num_subgroups: 2
  strategy: "max"
  frame_dim: 14192   # 7096 × 2

# ---------------------------------------------------------------------------
# Group-level temporal model  (LSTM2)
# ---------------------------------------------------------------------------
group_lstm:
  fc_input_dim: 14192
  fc_hidden_dim: 3000
  hidden_dim: 2000
  num_layers: 1
  num_timesteps: 10
  dropout: 0.0
  bidirectional: false

# ---------------------------------------------------------------------------
# Classification heads
# ---------------------------------------------------------------------------
classifier:
  group:
    in_dim: 2000
    num_classes: 8
  person:
    in_dim: 3000
    num_classes: 9

# ---------------------------------------------------------------------------
# Loss
# ---------------------------------------------------------------------------
loss:
  group_weight: 1.0
  person_weight: 1.0
  label_smoothing: 0.0

# ---------------------------------------------------------------------------
# Training protocol
# ---------------------------------------------------------------------------
training:
  stage1:
    epochs: 50
    batch_size: 8
    optimizer: "sgd"
    lr: 0.00001
    momentum: 0.9
    weight_decay: 0.0005
    lr_scheduler: null
    grad_clip: 5.0

  stage2:
    epochs: 50
    batch_size: 8
    optimizer: "sgd"
    lr: 0.00001
    momentum: 0.9
    weight_decay: 0.0005
    lr_scheduler: null
    grad_clip: 5.0

  seed: 42
  device: "cuda"
  mixed_precision: false
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_every_n_epochs: 5
  early_stopping_patience: 20

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
evaluation:
  batch_size: 16
  metrics:
    - "accuracy"
    - "confusion_matrix"
    - "per_class_accuracy"
  checkpoint: "best"

# ---------------------------------------------------------------------------
# Testing
# Maps each test file name to a human-readable description of the
# module / class it exercises. Used by scripts/run_tests.py.
# Add or remove entries here whenever test files are added or removed.
# ---------------------------------------------------------------------------
testing:
  tests_dir: "tests"
  module_under_test:
    test_dataset.py:          "VolleyballDataset / volleyball_collate"
    test_person_embedder.py:  "PersonEmbedder"
    test_subgroup_pooler.py:  "SubGroupPooler / make_subgroup_indices"
    test_frame_descriptor.py: "FrameDescriptor"
    test_hierarchical.py:     "HierarchicalGroupActivityModel"